<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Expense Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #040d14; }
        .robinhood-bg-green { background-color: #00c805; }
        .robinhood-bg-green:hover { background-color: #00b004; }
        .card-dark { background-color: #0e1e24; border: 1px solid #1e323a; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="text-gray-100 min-h-screen font-sans antialiased pb-28 relative">

    <!-- DASHBOARD HEADER -->
    <header class="border-b border-gray-800 bg-[#040d14] sticky top-0 z-40 backdrop-blur-md bg-opacity-80">
        <div class="max-w-4xl mx-auto px-4 py-6 flex justify-between items-center">
            <div>
                <h1 class="text-sm font-semibold tracking-wider text-gray-400 uppercase">Monthly Expenses</h1>
                <div class="text-4xl font-bold tracking-tight mt-1">$<span id="total-amount">0.00</span></div>
            </div>
            <div id="sync-badge" class="text-xs text-gray-500 bg-gray-900/50 px-3 py-1.5 rounded-lg border border-gray-800 flex items-center gap-1.5">
                <span id="sync-dot" class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span>
                <span id="sync-text">Connecting...</span>
            </div>
        </div>
    </header>

    <!-- CONTENT BODY -->
    <main class="max-w-4xl mx-auto px-4 mt-6 space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-start">
            
            <!-- Standard Desktop Form Input Panel -->
            <div class="hidden md:block md:col-span-1 space-y-6">
                <section class="card-dark p-5 rounded-2xl shadow-xl">
                    <h2 class="text-base font-bold mb-4 text-white">Log Expense</h2>
                    <form id="desktop-expense-form" class="space-y-4">
                        <div>
                            <label class="block text-xs font-medium text-gray-400 mb-1">Description</label>
                            <input type="text" id="d-expense-desc" required placeholder="e.g., Electric bill" class="w-full bg-[#172a32] border border-gray-700 rounded-xl px-4 py-2 text-white text-sm focus:outline-none focus:border-[#00c805]">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-400 mb-1">Amount ($)</label>
                            <input type="number" id="d-expense-amount" required step="0.01" min="0.01" placeholder="0.00" class="w-full bg-[#172a32] border border-gray-700 rounded-xl px-4 py-2 text-white text-sm focus:outline-none focus:border-[#00c805]">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-400 mb-1">Notes</label>
                            <input type="text" id="d-expense-note" placeholder="Optional" class="w-full bg-[#172a32] border border-gray-700 rounded-xl px-4 py-2 text-white text-sm focus:outline-none focus:border-[#00c805]">
                        </div>
                        <button type="submit" class="w-full robinhood-bg-green text-[#040d14] font-bold py-2.5 rounded-xl transition text-sm tracking-wide mt-2">Add Expense</button>
                    </form>
                </section>
            </div>

            <!-- Visualization Wheel Column -->
            <div class="col-span-1 md:col-span-2 space-y-6">
                <section class="card-dark p-6 rounded-2xl shadow-xl flex flex-col sm:flex-row items-center justify-center gap-6 min-h-[220px]">
                    <div class="w-full max-w-[180px] relative flex-shrink-0">
                        <canvas id="expense-chart"></canvas>
                    </div>
                    <div id="chart-fallback" class="text-sm text-gray-500 text-center py-8 hidden w-full">No data logged yet.</div>
                    <div id="chart-legend" class="w-full grid grid-cols-2 gap-2 text-xs text-gray-400 max-h-[150px] overflow-y-auto pr-1"></div>
                </section>
            </div>
        </div>

        <!-- Sorted Itemized Output -->
        <section class="card-dark p-6 rounded-2xl shadow-xl">
            <h2 class="text-base font-bold mb-4 text-white flex items-center justify-between">
                <span>Itemized Breakdown</span>
                <span class="text-xs font-normal text-gray-400">Tap values or notes to edit inline</span>
            </h2>
            <div id="list-fallback" class="text-sm text-gray-500 text-center py-6">No items registered this month.</div>
            <div id="expense-list-container" class="divide-y divide-gray-800 hidden"></div>
        </section>
    </main>

    <!-- FLOATING PLUS BUTTON -->
    <button id="global-fab" class="fixed bottom-6 right-6 w-14 h-14 robinhood-bg-green text-[#040d14] rounded-full flex items-center justify-center shadow-2xl z-50 transition transform active:scale-95 hover:scale-105">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4" />
        </svg>
    </button>

    <!-- DRAWER MODAL -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/70 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-200 z-50 flex items-end sm:items-center sm:justify-center px-0 sm:px-4">
        <div id="modal-container" class="w-full sm:max-w-md bg-[#0e1e24] border-t sm:border border-gray-800 rounded-t-3xl sm:rounded-2xl p-6 shadow-2xl transform translate-y-full sm:translate-y-4 transition-transform duration-200 pb-10 sm:pb-6">
            <div class="flex items-center justify-between mb-5">
                <h3 class="text-lg font-bold text-white">Log Expense</h3>
                <button id="close-modal-btn" class="p-1 text-gray-400 hover:text-white transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            <form id="mobile-expense-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1">Description</label>
                    <input type="text" id="m-expense-desc" required class="w-full bg-[#172a32] border border-gray-700 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-[#00c805]">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1">Amount ($)</label>
                    <input type="number" id="m-expense-amount" required step="0.01" min="0.01" class="w-full bg-[#172a32] border border-gray-700 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-[#00c805]">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1">Notes <span class="text-gray-500">(Optional)</span></label>
                    <input type="text" id="m-expense-note" class="w-full bg-[#172a32] border border-gray-700 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-[#00c805]">
                </div>
                <button type="submit" class="w-full robinhood-bg-green text-[#040d14] font-bold py-3.5 rounded-xl transition text-sm tracking-wide mt-2">Add Expense</button>
            </form>
        </div>
    </div>

    <script type="module">
        // PERMANENT HARDCODED SYNC PATHWAY
        const CLOUD_API_URL = 'https://kvdb.io/66qM6863G9L2D6e9fN4XU9/shared_expense_stream_v3';
        
        let expenses = JSON.parse(localStorage.getItem('ro_pure_local_expenses')) || [];
        let chartInstance = null;
        const dynamicColors = ['#00c805', '#ff5000', '#ffb700', '#0094ff', '#9d4edd', '#e63946', '#00f5d4', '#ff007f'];

        const totalAmountDisplay = document.getElementById('total-amount');
        const chartLegend = document.getElementById('chart-legend');
        const expenseListContainer = document.getElementById('expense-list-container');
        const listFallback = document.getElementById('list-fallback');
        
        const globalFab = document.getElementById('global-fab');
        const modalOverlay = document.getElementById('modal-overlay');
        const modalContainer = document.getElementById('modal-container');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const mobileForm = document.getElementById('mobile-expense-form');
        const desktopForm = document.getElementById('desktop-expense-form');
        
        const syncDot = document.getElementById('sync-dot');
        const syncText = document.getElementById('sync-text');

        initCloudSession();

        async function initCloudSession() {
            setSyncStatus('syncing', 'Syncing...');
            await pullFromCloud();
            updateAppUI();
            
            // Background polling loop runs every 5 seconds to match updates between devices
            setInterval(pullFromCloud, 5000);
        }

        function setSyncStatus(state, message) {
            syncText.textContent = message;
            syncDot.className = "w-2 h-2 rounded-full animate-pulse ";
            if (state === 'success') syncDot.classList.add('bg-[#00c805]');
            else if (state === 'syncing') syncDot.classList.add('bg-yellow-500');
            else syncDot.className = "w-2 h-2 rounded-full bg-red-500";
        }

        function openModal() {
            modalOverlay.classList.remove('pointer-events-none');
            modalOverlay.classList.add('opacity-100');
            modalContainer.classList.remove('translate-y-full', 'sm:translate-y-4');
            modalContainer.classList.add('translate-y-0');
        }

        function closeModal() {
            modalOverlay.classList.add('pointer-events-none');
            modalOverlay.classList.remove('opacity-100');
            modalContainer.classList.remove('translate-y-0');
            modalContainer.classList.add('translate-y-full', 'sm:translate-y-4');
        }

        globalFab.addEventListener('click', openModal);
        closeModalBtn.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });

        async function processNewExpense(desc, amount, note) {
            expenses.push({ id: Date.now(), desc, amount, note });
            updateAppUI();
            await pushToCloud();
            closeModal();
        }

        mobileForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const desc = document.getElementById('m-expense-desc').value.trim();
            const amount = parseFloat(document.getElementById('m-expense-amount').value);
            const note = document.getElementById('m-expense-note').value.trim();
            mobileForm.reset();
            await processNewExpense(desc, amount, note);
        });

        desktopForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const desc = document.getElementById('d-expense-desc').value.trim();
            const amount = parseFloat(document.getElementById('d-expense-amount').value);
            const note = document.getElementById('d-expense-note').value.trim();
            desktopForm.reset();
            await processNewExpense(desc, amount, note);
        });

        window.deleteExpense = async function(id) {
            expenses = expenses.filter(exp => exp.id !== id);
            updateAppUI();
            await pushToCloud();
        }

        window.handleAmountEdit = async function(element, id) {
            const target = expenses.find(exp => exp.id === id);
            if (!target) return;
            const rawText = element.textContent.replace(/[$,]/g, '').trim();
            let parsed = parseFloat(rawText);
            if (isNaN(parsed) || parsed < 0) parsed = target.amount;

            if (target.amount !== parsed) {
                target.amount = parsed;
                updateAppUI();
                await pushToCloud();
            } else {
                element.textContent = '$' + target.amount.toLocaleString('en-US', { minimumFractionDigits: 2 });
            }
        }

        window.handleNoteEdit = async function(element, id) {
            const target = expenses.find(exp => exp.id === id);
            if (!target) return;
            const newNote = element.textContent.trim();
            if (target.note !== newNote) {
                target.note = newNote;
                localStorage.setItem('ro_pure_local_expenses', JSON.stringify(expenses));
                await pushToCloud();
            }
        }

        async function pushToCloud() {
            setSyncStatus('syncing', 'Updating Cloud...');
            try {
                const res = await fetch(CLOUD_API_URL, { method: 'POST', body: JSON.stringify(expenses) });
                if (res.ok) setSyncStatus('success', 'Live Synced');
                else setSyncStatus('error', 'Sync Failed');
            } catch (e) { setSyncStatus('error', 'Network Error'); }
        }

        async function pullFromCloud() {
            try {
                const res = await fetch(CLOUD_API_URL);
                if (res.ok) {
                    const cloudData = await res.json();
                    if (Array.isArray(cloudData) && JSON.stringify(expenses) !== JSON.stringify(cloudData)) {
                        expenses = cloudData;
                        updateAppUI();
                    }
                    setSyncStatus('success', 'Live Synced');
                }
            } catch (e) { console.error("Pull failure", e); }
        }

        function updateAppUI() {
            localStorage.setItem('ro_pure_local_expenses', JSON.stringify(expenses));
            let total = 0;
            expenses.forEach(exp => total += exp.amount);
            totalAmountDisplay.textContent = total.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            updateChart(total);
            renderSortedList();
        }

        function renderSortedList() {
            if (expenses.length === 0) {
                listFallback.classList.remove('hidden');
                expenseListContainer.classList.add('hidden');
                return;
            }
            listFallback.classList.add('hidden');
            expenseListContainer.className = "divide-y divide-gray-800";

            const sorted = [...expenses].sort((a, b) => b.amount - a.amount);
            expenseListContainer.innerHTML = sorted.map(item => {
                const origIdx = expenses.findIndex(e => e.id === item.id);
                const color = dynamicColors[origIdx % dynamicColors.length] || '#4b5563';
                return `
                    <div class="flex items-center justify-between py-3.5 px-2 rounded-xl">
                        <div class="flex items-center gap-3 truncate pr-4 min-w-0 flex-grow">
                            <span class="w-2.5 h-2.5 rounded-full flex-shrink-0 mt-1 self-start" style="background-color: ${color}"></span>
                            <div class="truncate flex flex-col">
                                <span class="font-medium text-sm text-gray-200 truncate">${escapeHtml(item.desc)}</span>
                                <span contenteditable="true" onblur="handleNoteEdit(this, ${item.id})" onkeydown="if(event.key === 'Enter') { event.preventDefault(); this.blur(); }" class="text-xs text-gray-500 italic truncate focus:text-gray-300 focus:outline-none rounded mt-0.5">${escapeHtml(item.note || 'Add a note...')}</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-4 flex-shrink-0 ml-2">
                            <span contenteditable="true" onblur="handleAmountEdit(this, ${item.id})" onkeydown="if(event.key === 'Enter') { event.preventDefault(); this.blur(); }" class="font-mono text-sm font-semibold text-white px-2 py-0.5 rounded bg-[#172a32] focus:outline-none">$${item.amount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</span>
                            <button onclick="deleteExpense(${item.id})" class="text-gray-500 hover:text-red-400 p-1"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg></button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateChart(grandTotal) {
            const fallbackEl = document.getElementById('chart-fallback');
            const canvasEl = document.getElementById('expense-chart');
            if (expenses.length === 0) {
                fallbackEl.classList.remove('hidden');
                canvasEl.classList.add('hidden');
                chartLegend.innerHTML = '';
                if (chartInstance) chartInstance.destroy();
                return;
            }
            fallbackEl.classList.add('hidden');
            canvasEl.classList.remove('hidden');
            const labels = expenses.map(e => e.desc);
            const dataValues = expenses.map(e => e.amount);
            const colors = expenses.map((_, index) => dynamicColors[index % dynamicColors.length]);

            chartLegend.innerHTML = '';
            expenses.forEach((e, idx) => {
                const itemPct = ((e.amount / grandTotal) * 100).toFixed(0);
                chartLegend.innerHTML += `<div class="flex items-center gap-2 truncate"><span class="w-2 h-2 rounded-full flex-shrink-0" style="background-color: ${colors[idx]}"></span><span class="truncate text-gray-300">${escapeHtml(e.desc)}</span><span class="text-gray-500 font-mono text-[10px] ml-auto">${itemPct}%</span></div>`;
            });

            if (chartInstance) {
                chartInstance.data.labels = labels;
                chartInstance.data.datasets[0].data = dataValues;
                chartInstance.data.datasets[0].backgroundColor = colors;
                chartInstance.update();
            } else {
                chartInstance = new Chart(canvasEl.getContext('2d'), {
                    type: 'pie',
                    data: { labels: labels, datasets: [{ data: dataValues, backgroundColor: colors, borderWidth: 2, borderColor: '#0e1e24' }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                });
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
