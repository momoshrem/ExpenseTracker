<!DOCTYPE html>
<html lang="en" class="h-full bg-[#0e1e24]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .modal-backdrop { background: rgba(5,12,15,0.72); }
        input:focus, select:focus, button:focus-visible { outline: 2px solid #00c805; outline-offset: 2px; }
    </style>
</head>
<body class="h-full font-sans antialiased text-gray-200">
    <div class="flex h-full flex-col lg:flex-row max-w-7xl mx-auto overflow-y-auto lg:overflow-hidden bg-[#0e1e24]">
        <main class="w-full lg:flex-1 flex flex-col justify-start p-6 lg:p-8 lg:border-r lg:border-gray-900 lg:overflow-y-auto no-scrollbar">
            <header class="flex items-start justify-between mb-8 gap-3">
                <div>
                    <h1 class="text-xs uppercase tracking-widest text-gray-500 font-bold">Total</h1>
                    <div class="flex items-baseline gap-1 mt-1 text-white">
                        <span class="text-2xl font-light text-gray-400">$</span>
                        <span id="total-amount" class="text-5xl font-semibold tracking-tight">0.00</span>
                    </div>
                </div>
                <div class="flex flex-col items-end gap-2">
                    <button id="sync-badge" class="flex items-center gap-2 bg-[#172a32] px-3 py-1.5 rounded-full border border-gray-800 hover:border-gray-700 transition">
                        <span id="sync-dot" class="w-2 h-2 rounded-full bg-gray-600"></span>
                        <span id="sync-text" class="text-xs font-medium text-gray-400 font-mono">Not connected</span>
                    </button>
                    <button id="settings-btn" class="text-[11px] text-gray-500 hover:text-gray-300 underline underline-offset-2">Sync settings</button>
                </div>
            </header>

            <section class="bg-[#12242c] rounded-2xl border border-gray-900 p-6 shadow-xl mb-6">
                <div class="flex flex-col md:flex-row gap-8 items-center justify-center">
                    <div class="relative w-40 h-40 sm:w-48 sm:h-48 flex-shrink-0 flex items-center justify-center">
                        <canvas id="expense-chart" class="w-full h-full"></canvas>
                    </div>
                    <div id="chart-legend" class="flex-1 grid grid-cols-2 gap-x-4 gap-y-2.5 text-xs w-full max-w-sm"></div>
                </div>
            </section>
        </main>

        <aside class="w-full lg:w-[460px] flex flex-col bg-[#0b171c] border-t lg:border-t-0 border-gray-900 lg:h-full">
            <div class="flex-1 lg:overflow-y-auto no-scrollbar p-6 space-y-2">
                <div id="list-fallback" class="py-12 text-center text-gray-600 text-sm hidden">No entries yet.</div>
                <div id="expense-list-container" class="space-y-2"></div>
            </div>
        </aside>
    </div>

    <!-- Global FAB -->
    <button id="global-fab" class="fixed bottom-6 right-6 z-40 bg-[#00c805] hover:bg-emerald-500 text-black p-4 rounded-full shadow-2xl transition-all hover:scale-105">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4" /></svg>
    </button>

    <!-- (Modals remain unchanged: Add expense and Settings modals) -->
    
    <script type="module">
        // ... (Keep existing logic exactly as provided in your script)
        // Note: Ensure the renderChart function no longer toggles the 'hidden' class on the canvas
        // and removes logic that references #chart-fallback.
    </script>
</body>
</html>
