<!DOCTYPE html>
<html lang="en" class="h-full bg-[#0e1e24]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamline - Shared Expenses</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="h-full font-sans antialiased text-gray-200 selection:bg-emerald-500 selection:text-black">

    <div class="flex h-full flex-col lg:flex-row max-w-7xl mx-auto overflow-hidden bg-[#0e1e24]">
        
        <!-- MAIN ANALYTICS PANEL (Left Side) -->
        <main class="flex-1 flex flex-col justify-start overflow-y-auto no-scrollbar p-6 lg:p-8 lg:border-r lg:border-gray-900">
            <!-- Header Status Area -->
            <header class="flex items-center justify-between mb-8">
                <div>
                    <h1 class="text-xs uppercase tracking-widest text-gray-500 font-bold">Total Portfolio Outflow</h1>
                    <div class="flex items-baseline gap-1 mt-1 text-white">
                        <span class="text-2xl font-light text-gray-400">$</span>
                        <span id="total-amount" class="text-5xl font-semibold tracking-tight">0.00</span>
                    </div>
                </div>
                
                <!-- Sync State Badge -->
                <div class="flex items-center gap-2 bg-[#172a32] px-3 py-1.5 rounded-full border border-gray-800">
                    <span id="sync-dot" class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span>
                    <span id="sync-text" class="text-xs font-medium text-gray-400 font-mono">Initializing...</span>
                </div>
            </header>

            <!-- Visualization Node -->
            <section class="bg-[#12242c] rounded-2xl border border-gray-900 p-6 shadow-xl mb-6">
                <h2 class="text-sm font-semibold text-gray-400 mb-6 tracking-wide">Expense Weights</h2>
                <div class="flex flex-col md:flex-row gap-8 items-center justify-center">
                    <div class="relative w-48 h-48 flex-shrink-0 flex items-center justify-center">
                        <!-- Fallback when data is empty -->
                        <div id="chart-fallback" class="absolute inset-0 flex flex-col items-center justify-center text-center p-4 bg-[#172a32] rounded-full border border-dashed border-gray-750">
                            <span class="text-xs text-gray-500">Awaiting allocations</span>
                        </div>
                        <canvas id="expense-chart" class="w-full h-full hidden"></canvas>
                    </div>
                    
                    <!-- Mini Legend Container -->
                    <div id="chart-legend" class="flex-1 grid grid-cols-2 gap-x-4 gap-y-2.5 text-xs w-full max-w-sm md:max-w-none">
                        <!-- Dynamic Content insertion -->
                    </div>
                </div>
            </section>
        </main>

        <!-- ITEMIZATION FEED PANEL (Right Side) -->
        <aside class="w-full lg:w-[460px] flex flex-col h-[50vh] lg:h-full bg-[#0b171c] border-t lg:border-t-0 border-gray-900">
            <div class="px-6 py-4 border-b border-gray-900 flex items-center justify-between bg-[#0e1e24] lg:bg-transparent">
                <h3 class="text-sm font-semibold tracking-wide text-gray-400">Transaction Stream</h3>
                <span class="text-[11px] bg-[#172a32] text-gray-400 px-2 py-0.5 rounded-md font-medium tracking-wider">Sorted by scale</span>
            </div>
            
            <!-- Dynamic Scroll Container -->
            <div class="flex-1 overflow-y-auto no-scrollbar p-4 space-y-2">
                <div id="list-fallback" class="py-12 text-center text-gray-600 text-sm hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 mx-auto mb-2 text-gray-700" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" /></svg>
                    No outlays mapped yet.
                </div>
                <div id="expense-list-container">
                    <!-- Javascript injection surface -->
                </div>
            </div>
        </aside>
    </div>

    <!-- GLOBAL FLOATING ACTION BUTTON (FAB) - Visible on all viewports -->
    <button id="global-fab" class="fixed bottom-6 right-6 z-40 bg-[#00c805] hover:bg-emerald-500 text-black p-4 rounded-full shadow-2xl transition-all duration-150 transform active:scale-95 hover:scale-105 flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4" /></svg>
    </button>

    <!-- UNIFIED ACTION MODAL SLIDE DRAWER -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 pointer-events-none opacity-0 transition-opacity duration-200 flex items-end sm:items-center sm:justify-center p-0 sm:p-4">
        <div id="modal-container" class="w-full sm:max-w-md bg-[#12242c] border border-gray-900 rounded-t-3xl sm:rounded-2xl shadow-2xl p-6 transition-transform duration-200 transform translate-y-full sm:translate-y-4">
            <div class="flex items-center justify-between mb-5">
                <h3 class="text-base font-semibold text-white">Log Expense Layer</h3>
                <button id="close-modal-btn" class="text-gray-500 hover:text-white p-1"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
            </div>
            
            <form id="global-expense-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1">Description</label>
                    <input type="text" id="expense-desc" required placeholder="e.g., AWS Cloud Infra, Subscriptions" class="w-full bg-[#172a32] border border-gray-800 rounded-xl px-3 py-2.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1">Amount ($)</label>
                    <input type="number" step="0.01" min="0.01" id="expense-amount" required placeholder="0.00" class="w-full bg-[#172a32] border border-gray-800 rounded-xl px-3 py-2.5 text-sm font-mono text-white placeholder-gray-600 focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1">Internal Note</label>
                    <input type="text" id="expense-note" placeholder="Optional context..." class="w-full bg-[#172a32] border border-gray-800 rounded-xl px-3 py-2.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-emerald-500">
                </div>
                <button type="submit" class="w-full bg-[#00c805] hover:bg-emerald-500 text-black font-semibold text-sm py-3 rounded-xl mt-2 transition-colors">
                    Commit Entry
                </button>
            </form>
        </div>
    </div>

    <!-- CORE RE-SYNCHRONIZED JAVA ENGINE MODULE -->
    <script type="module">
        const CLOUD_API_URL = 'https://kvdb.io/66qM6863G9L2D6e9fN4XU9/shared_expense_stream_v3';
        
        let expenses = JSON.parse(localStorage.getItem('ro_pure_local_expenses')) || [];
        let chartInstance = null;
        const dynamicColors = ['#00c805', '#ff5000', '#ffb700', '#0094ff', '#9d4edd', '#e63946', '#00f5d4', '#ff007f'];

        const totalAmountDisplay = document.getElementById('total-amount');
        const chartLegend = document.getElementById('chart-legend');
        const expenseListContainer = document.getElementById('expense-list-container');
        const listFallback = document.getElementById('list-fallback');
        
        const globalFab = document.getElementById('global-fab');
        const modalOverlay = document.getElementById('modal-overlay');
        const modalContainer = document.getElementById('modal-container');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const globalForm = document.getElementById('global-expense-form');
        
        const syncDot = document.getElementById('sync-dot');
        const syncText = document.getElementById('sync-text');

        initCloudSession();

        async function initCloudSession() {
            setSyncStatus('syncing', 'Syncing...');
            await pullFromCloud();
            updateAppUI();
            setInterval(pullFromCloud, 5000);
        }

        function setSyncStatus(state, message) {
            syncText.textContent = message;
            syncDot.className = "w-2 h-2 rounded-full animate-pulse ";
            if (state === 'success') syncDot.classList.add('bg-[#00c805]');
            else if (state === 'syncing') syncDot.classList.add('bg-yellow-500');
            else syncDot.className = "w-2 h-2 rounded-full bg-red-500";
        }

        function openModal() {
            modalOverlay.classList.remove('pointer-events-none');
            modalOverlay.classList.add('opacity-100');
            modalContainer.classList.remove('translate-y-full', 'sm:translate-y-4');
            modalContainer.classList.add('translate-y-0');
        }

        function closeModal() {
            modalOverlay.classList.add('pointer-events-none');
            modalOverlay.classList.remove('opacity-100');
            modalContainer.classList.remove('translate-y-0');
            modalContainer.classList.add('translate-y-full', 'sm:translate-y-4');
        }

        globalFab.addEventListener('click', openModal);
        closeModalBtn.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });

        globalForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const desc = document.getElementById('expense-desc').value.trim();
            const amount = parseFloat(document.getElementById('expense-amount').value);
            const note = document.getElementById('expense-note').value.trim();
            
            globalForm.reset();
            
            expenses.push({ id: Date.now(), desc, amount, note });
            updateAppUI();
            await pushToCloud();
            closeModal();
        });

        window.deleteExpense = async function(id) {
            expenses = expenses.filter(exp => exp.id !== id);
            updateAppUI();
            await pushToCloud();
        }

        window.handleAmountEdit = async function(element, id) {
            const target = expenses.find(exp => exp.id === id);
            if (!target) return;
            const rawText = element.textContent.replace(/[$,]/g, '').trim();
            let parsed = parseFloat(rawText);
            if (isNaN(parsed) || parsed < 0) parsed = target.amount;

            if (target.amount !== parsed) {
                target.amount = parsed;
                updateAppUI();
                await pushToCloud();
            } else {
                element.textContent = '$' + target.amount.toLocaleString('en-US', { minimumFractionDigits: 2 });
            }
        }

        window.handleNoteEdit = async function(element, id) {
            const target = expenses.find(exp => exp.id === id);
            if (!target) return;
            const newNote = element.textContent.trim();
            if (target.note !== newNote) {
                target.note = newNote;
                updateAppUI();
                await pushToCloud();
            }
        }

        async function pushToCloud() {
            setSyncStatus('syncing', 'Updating Cloud...');
            try {
                const res = await fetch(CLOUD_API_URL, { method: 'POST', body: JSON.stringify(expenses) });
                if (res.ok) setSyncStatus('success', 'Live Synced');
                else setSyncStatus('error', 'Sync Failed');
            } catch (e) { setSyncStatus('error', 'Network Error'); }
        }

        async function pullFromCloud() {
            try {
                const res = await fetch(CLOUD_API_URL);
                if (res.ok) {
                    const cloudData = await res.json();
                    if (Array.isArray(cloudData) && JSON.stringify(expenses) !== JSON.stringify(cloudData)) {
                        expenses = cloudData;
                        updateAppUI();
                    }
                    setSyncStatus('success', 'Live Synced');
                }
            } catch (e) { console.error("Pull failure", e); }
        }

        function updateAppUI() {
            localStorage.setItem('ro_pure_local_expenses', JSON.stringify(expenses));
            let total = 0;
            expenses.forEach(exp => total += exp.amount);
            totalAmountDisplay.textContent = total.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            
            const sortedExpenses = [...expenses].sort((a, b) => b.amount - a.amount);
            
            updateChart(sortedExpenses, total);
            renderSortedList(sortedExpenses);
        }

        function renderSortedList(sorted) {
            if (expenses.length === 0) {
                listFallback.classList.remove('hidden');
                expenseListContainer.classList.add('hidden');
                return;
            }
            listFallback.classList.add('hidden');
            expenseListContainer.className = "divide-y divide-gray-800";

            expenseListContainer.innerHTML = sorted.map((item, idx) => {
                const color = dynamicColors[idx % dynamicColors.length] || '#4b5563';
                return `
                    <div class="flex items-center justify-between py-3.5 px-2 rounded-xl">
                        <div class="flex items-center gap-3 truncate pr-4 min-w-0 flex-grow">
                            <span class="w-2.5 h-2.5 rounded-full flex-shrink-0 mt-1 self-start" style="background-color: ${color}"></span>
                            <div class="truncate flex flex-col">
                                <span class="font-medium text-sm text-gray-200 truncate">${escapeHtml(item.desc)}</span>
                                <span contenteditable="true" onblur="handleNoteEdit(this, ${item.id})" onkeydown="if(event.key === 'Enter') { event.preventDefault(); this.blur(); }" class="text-xs text-gray-500 italic truncate focus:text-gray-300 focus:outline-none rounded mt-0.5">${item.note ? escapeHtml(item.note) : 'Add a note...'}</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-4 flex-shrink-0 ml-2">
                            <span contenteditable="true" onblur="handleAmountEdit(this, ${item.id})" onkeydown="if(event.key === 'Enter') { event.preventDefault(); this.blur(); }" class="font-mono text-sm font-semibold text-white px-2 py-0.5 rounded bg-[#172a32] focus:outline-none">$${item.amount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</span>
                            <button onclick="deleteExpense(${item.id})" class="text-gray-500 hover:text-red-400 p-1"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg></button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateChart(sorted, grandTotal) {
            const fallbackEl = document.getElementById('chart-fallback');
            const canvasEl = document.getElementById('expense-chart');
            if (sorted.length === 0) {
                fallbackEl.classList.remove('hidden');
                canvasEl.classList.add('hidden');
                chartLegend.innerHTML = '';
                if (chartInstance) chartInstance.destroy();
                return;
            }
            fallbackEl.classList.add('hidden');
            canvasEl.classList.remove('hidden');
            
            const labels = sorted.map(e => e.desc);
            const dataValues = sorted.map(e => e.amount);
            const colors = sorted.map((_, index) => dynamicColors[index % dynamicColors.length]);

            chartLegend.innerHTML = '';
            sorted.forEach((e, idx) => {
                const itemPct = grandTotal > 0 ? ((e.amount / grandTotal) * 100).toFixed(0) : 0;
                chartLegend.innerHTML += `<div class="flex items-center gap-2 truncate"><span class="w-2 h-2 rounded-full flex-shrink-0" style="background-color: ${colors[idx]}"></span><span class="truncate text-gray-300">${escapeHtml(e.desc)}</span><span class="text-gray-500 font-mono text-[10px] ml-auto">${itemPct}%</span></div>`;
            });

            if (chartInstance) {
                chartInstance.data.labels = labels;
                chartInstance.data.datasets[0].data = dataValues;
                chartInstance.data.datasets[0].backgroundColor = colors;
                chartInstance.update();
            } else {
                chartInstance = new Chart(canvasEl.getContext('2d'), {
                    type: 'pie',
                    data: { labels: labels, datasets: [{ data: dataValues, backgroundColor: colors, borderWidth: 2, borderColor: '#0e1e24' }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                });
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
